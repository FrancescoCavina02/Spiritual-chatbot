services:
  - type: web
    name: spiritual-chatbot-api
    env: docker
    dockerfilePath: Dockerfile.railway
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 8000
      - key: LOG_LEVEL
        value: INFO
      - key: OPENAI_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
